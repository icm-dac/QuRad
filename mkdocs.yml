site_name: QuRad Documentation
site_description: Comprehensive radiomics feature extraction for QuPath
site_author: QuRad Team
site_url: https://icm-dac.github.io/QuRad/
repo_url: https://github.com/icm-dac/QuRad
repo_name: QuRad

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Feature Reference: features.md
  - Example Application: example-application.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/icm-dac/QuRad
